<style>
:root {
  --ink: #333333;
  --paper: #ffffff;
  --brand-orange: #d97b29; /* 画像の警告文の色 */
  --line: #cccccc;
  --sans: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 20px;
  background-color: var(--paper);
  font-family: var(--sans);
  color: var(--ink);
}

.container {
  max-width: 450px;
  margin: 0 auto;
}

/* タイトルと警告文 */
h2 {
  font-size: 1.25rem;
  margin-bottom: 15px;
  border-bottom: none;
}

.ssl-notice {
  color: var(--brand-orange);
  font-size: 0.95rem;
  font-weight: bold;
  line-height: 1.5;
  margin-bottom: 20px;
}

/* カードブランドロゴのプレースホルダー */
.brand-logos {
  display: flex;
  gap: 5px;
  margin-bottom: 25px;
}
.brand-logo {
  border: 1px solid #ddd;
  padding: 2px 5px;
  font-size: 10px;
  font-weight: bold;
  color: #666;
  border-radius: 2px;
}

/* フォーム要素 */
.form-group {
  margin-bottom: 15px;
}

label {
  display: block;
  font-size: 0.9rem;
  font-weight: bold;
  margin-bottom: 5px;
}

input[type="text"],
input[type="password"],
select {
  width: 100%;
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-size: 1rem;
}

/* 有効期限・生年月日の横並びレイアウト */
.row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.row select {
  flex: 1;
}

/* 送信ボタン（本物っぽく） */
.submit-btn {
  width: 100%;
  padding: 12px;
  background-color: #f0f0f0;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}
.submit-btn:hover {
  background-color: #e0e0e0;
}
</style>

<div class="container">
  <h2>お支払い方法の更新</h2>
  
  <!-- 画像の文言を忠実に再現 -->
  <p class="ssl-notice">
    お客様の個人情報を安全に送信するためにSSL暗号化通信を利用し、第三者によるデータの改ざんや盗用を防いでいます。
  </p>

  <!-- カードブランドロゴ（実際は画像を使用） -->
  <div class="brand-logos">
    <span class="brand-logo" style="color:#003399;">VISA</span>
    <span class="brand-logo" style="color:#eb001b;">Mastercard</span>
    <span class="brand-logo" style="color:#007bc1;">AMEX</span>
    <span class="brand-logo" style="color:#000000;">Diners</span>
    <span class="brand-logo" style="color:#ff6600;">JCB</span>
  </div>

  <form id="payment-form">
    <div class="form-group">
      <label>クレジットカード名義人</label>
      <input type="text" name="holder_name">
    </div>

    <div class="form-group">
      <label>カード番号</label>
      <input type="text" name="card_number">
    </div>

    <div class="form-group">
      <label>有効期限:</label>
      <div class="row">
        <select name="exp_month">
          <option value="01">01</option>
          <!-- 省略 -->
        </select>
        <select name="exp_year">
          <option value="2021">2021</option>
          <!-- 省略 -->
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>セキュリティコード</label>
      <input type="text" placeholder="CVV/CVV2">
    </div>

    <div class="form-group">
      <label>生年月日</label>
      <div class="row">
        <select name="birth_day"><option>日</option></select>
        <select name="birth_month"><option>月</option></select>
        <select name="birth_year"><option>年</option></select>
      </div>
    </div>

    <button type="button" class="submit-btn" onclick="alert('情報の更新が完了しました。')">
      情報を更新する
    </button>
  </form>
</div>
