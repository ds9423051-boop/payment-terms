<style>
:root {
  --ink: #333333;
  --paper: #ffffff;
  --brand-orange: #d97b29; /* 画像[2]の警告文の色 */
  --line: #cccccc;
  --sans: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 20px;
  background-color: var(--paper);
  font-family: var(--sans);
  color: var(--ink);
}

.container {
  max-width: 450px;
  margin: 0 auto;
}

h2 {
  font-size: 1.25rem;
  margin-bottom: 15px;
  border-bottom: none;
}

/* 画像[2]にあるSSLの警告文のスタイル */
.ssl-notice {
  color: var(--brand-orange);
  font-size: 0.95rem;
  font-weight: bold;
  line-height: 1.5;
  margin-bottom: 20px;
}

/* カードブランドの並び */
.brand-logos {
  display: flex;
  gap: 5px;
  margin-bottom: 25px;
}
.brand-logo {
  border: 1px solid #ddd;
  padding: 2px 5px;
  font-size: 10px;
  font-weight: bold;
  color: #666;
  border-radius: 2px;
}

.form-group {
  margin-bottom: 15px;
}

label {
  display: block;
  font-size: 0.9rem;
  font-weight: bold;
  margin-bottom: 5px;
}

input[type="text"],
select {
  width: 100%;
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-size: 1rem;
  background-color: #fff;
}

.row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.row select {
  flex: 1;
}

.submit-btn {
  width: 100%;
  padding: 12px;
  background-color: #f0f0f0;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}
</style>

<div class="container">
  <h2>お支払い方法の更新</h2>
  
  <p class="ssl-notice">
    お客様の個人情報を安全に送信するためにSSL暗号化通信を利用し、第三者によるデータの改ざんや盗用を防いでいます。
  </p>

  <div class="brand-logos">
    <span class="brand-logo" style="color:#003399;">VISA</span>
    <span class="brand-logo" style="color:#eb001b;">Mastercard</span>
    <span class="brand-logo" style="color:#007bc1;">AMEX</span>
    <span class="brand-logo" style="color:#000000;">Diners</span>
    <span class="brand-logo" style="color:#ff6600;">JCB</span>
  </div>

  <form id="payment-form">
    <div class="form-group">
      <label>クレジットカード名義人</label>
      <input type="text" placeholder="TARO YAMADA">
    </div>

    <div class="form-group">
      <label>カード番号</label>
      <input type="text" placeholder="0000 0000 0000 0000">
    </div>

    <!-- 有効期限の選択（1〜12月、2026〜2035年） -->
    <div class="form-group">
      <label>有効期限:</label>
      <div class="row">
        <select>
          <option value="">月</option>
          <script>
            for(let i=1; i<=12; i++) {
              document.write(`<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`);
            }
          </script>
        </select>
        <select>
          <option value="">年</option>
          <script>
            for(let i=2026; i<=2035; i++) {
              document.write(`<option value="${i}">${i}</option>`);
            }
          </script>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>セキュリティコード</label>
      <input type="text" placeholder="CVV/CVV2">
    </div>

    <!-- 生年月日の選択 -->
    <div class="form-group">
      <label>生年月日</label>
      <div class="row">
        <select>
          <option value="">年</option>
          <script>
            for(let i=2010; i>=1940; i--) {
              document.write(`<option value="${i}">${i}</option>`);
            }
          </script>
        </select>
        <select>
          <option value="">月</option>
          <script>
            for(let i=1; i<=12; i++) {
              document.write(`<option value="${i}">${i}</option>`);
            }
          </script>
        </select>
        <select>
          <option value="">日</option>
          <script>
            for(let i=1; i<=31; i++) {
              document.write(`<option value="${i}">${i}</option>`);
            }
          </script>
        </select>
      </div>
    </div>

    <button type="button" class="submit-btn" onclick="alert('情報の更新が完了しました。')">
      情報を更新する
    </button>
  </form>
</div>
